pre-commit:
  commands:
    lint:
      glob: '*.go'
      run: make lint
    glazed-lint:
      glob: '*.go'
      run: make glazed-lint
    test:
      glob: '*.go'
      run: make test
  parallel: true

pre-push:
  commands:
    release:
      run: make goreleaser
    lint:
      run: make lint
    test:
      run: make test
  parallel: true
