name: golang-pipeline

on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: generate assets
        run: go generate ./...
      - name: install webkit2gtk-4.1 dev libs (for CGO Wails build)
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev
      - name: regenerate frontend css
        run: go run -tags webkit2_41 ./cmd/gen-chroma-css
      - name: run unit tests
        run: go test -tags webkit2_41 ./...
