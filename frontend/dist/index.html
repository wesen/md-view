<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>md-view</title>
    <!-- App chrome (toolbar / dropzone / sidebar) -->
    <link rel="stylesheet" href="style.css">
    <!-- GitHub-flavored markdown content styling -->
    <link rel="stylesheet" href="base.css">
    <!-- Syntax highlighting (dual-theme, generated: make frontend-css) -->
    <link rel="stylesheet" href="chroma.css">
    <!-- In-page UI chrome: frontmatter block, copy/reMarkable/toolbar buttons (generated) -->
    <link rel="stylesheet" href="ui.css">
    <!-- Dark page overrides (activated by [data-theme="dark"] on <html>) -->
    <link rel="stylesheet" href="dark.css">
</head>
<body data-theme="light">
    <!-- Toolbar -->
    <div id="toolbar">
        <button id="open-btn" title="Open File (Ctrl+O)">📂 Open</button>
        <span id="filename">No file open</span>
        <button id="theme-btn" title="Toggle Theme">🌙 Dark</button>
    </div>

    <!-- Error bar -->
    <div id="error" style="display:none"></div>

    <!-- Main content area -->
    <div id="main">
        <!-- Drop zone: shown when no file is open -->
        <div id="dropzone">
            <div id="dropzone-inner">
                <div class="dropzone-icon">📄</div>
                <p>Drop a Markdown file here</p>
                <p class="hint">or click <strong>Open</strong> to browse</p>
            </div>
        </div>

        <!-- Rendered content: shown when a file is open.
             window.MDSAugmentPage() (in augment.js) is re-run after every swap
             to inject copy buttons and render mermaid blocks. -->
        <div id="content" class="markdown-body" style="display:none"></div>
    </div>

    <!-- Recent files sidebar -->
    <div id="sidebar" style="display:none">
        <h3>Recent Files</h3>
        <ul id="recent-list"></ul>
    </div>

    <!-- Wails runtime (auto-injected in dev; needed for runtime.EventsOn) -->
    <script src="/wails/runtime.js"></script>
    <!-- Mermaid diagram library -->
    <script src="mermaid.min.js"></script>
    <!-- Content augmentation: copy buttons + mermaid (re-runnable after content swaps) -->
    <script src="augment.js"></script>
    <!-- Fixed-position toolbar buttons (reMarkable / copy-path / download) -->
    <script src="buttons.js"></script>
    <!-- App logic -->
    <script src="app.js"></script>
</body>
</html>
